name: Push sync to Mail.ru folder

on:
  workflow_dispatch:
    inputs:
      mailru_login:
        description: "Почта Mail.ru (например rusakov_751@bk.ru)"
        required: true
        type: string
      mailru_password:
        description: "Пароль для внешних приложений (не обычный пароль почты)"
        required: true
        type: string
  schedule:
    # Needs repository secrets MAILRU_LOGIN + MAILRU_PASSWORD.
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/push_mailru_sync.py"
      - ".github/workflows/mailru-sync.yml"

jobs:
  push-mailru:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve credentials
        env:
          SECRET_LOGIN: ${{ secrets.MAILRU_LOGIN || secrets.MAILRU_EMAIL || secrets.MAIL_LOGIN }}
          SECRET_PASSWORD: ${{ secrets.MAILRU_PASSWORD || secrets.MAILRU_PASS || secrets.MAILRU_APP_PASSWORD || secrets.MAIL_PASSWORD }}
          INPUT_LOGIN: ${{ inputs.mailru_login }}
          INPUT_PASSWORD: ${{ inputs.mailru_password }}
        run: |
          LOGIN="${INPUT_LOGIN:-$SECRET_LOGIN}"
          PASS="${INPUT_PASSWORD:-$SECRET_PASSWORD}"
          if [ -n "$PASS" ]; then
            echo "::add-mask::$PASS"
          fi
          if [ -n "$LOGIN" ]; then
            echo "::add-mask::$LOGIN"
          fi
          if [ -z "$LOGIN" ] || [ -z "$PASS" ]; then
            echo "::error::Нужны почта и пароль приложения. Запустите workflow вручную и заполните оба поля формы."
            echo "Форма: https://github.com/Ludecani/tz-map-bothost/actions/workflows/mailru-sync.yml"
            exit 1
          fi
          if [ -n "$INPUT_LOGIN" ]; then
            echo "Источник: форма Run workflow"
          else
            echo "Источник: repository secrets"
          fi
          {
            echo "MAILRU_LOGIN=$LOGIN"
            echo "MAILRU_PASSWORD=$PASS"
          } >> "$GITHUB_ENV"

      - name: Upload sync-state.json to Mail.ru shared folder
        env:
          SYNC_JSONBLOB_URL: ${{ secrets.SYNC_JSONBLOB_URL }}
          MAILRU_WEBLINK: ${{ secrets.MAILRU_WEBLINK }}
          MAILRU_SYNC_NAME: ${{ secrets.MAILRU_SYNC_NAME }}
        run: python3 scripts/push_mailru_sync.py
