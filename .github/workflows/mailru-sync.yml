name: Push sync to Mail.ru folder

on:
  workflow_dispatch:
    inputs:
      mailru_login:
        description: "Почта Mail.ru (опционально; иначе берётся из secrets/cred-blob)"
        required: false
        type: string
        default: ""
      mailru_password:
        description: "Пароль приложения (опционально; иначе берётся из secrets/cred-blob)"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "*/2 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/push_mailru_sync.py"
      - ".github/workflows/mailru-sync.yml"

jobs:
  push-mailru:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve credentials
        env:
          SECRET_LOGIN: ${{ secrets.MAILRU_LOGIN }}
          SECRET_PASSWORD: ${{ secrets.MAILRU_PASSWORD }}
        run: |
          set -euo pipefail
          INPUT_LOGIN="$(python3 -c 'import json,os; e=json.load(open(os.environ["GITHUB_EVENT_PATH"])); print(((e.get("inputs") or {}).get("mailru_login") or "").strip())')"
          INPUT_PASSWORD="$(python3 -c 'import json,os; e=json.load(open(os.environ["GITHUB_EVENT_PATH"])); print(((e.get("inputs") or {}).get("mailru_password") or "").strip())')"
          LOGIN="${INPUT_LOGIN:-${SECRET_LOGIN:-}}"
          PASS="${INPUT_PASSWORD:-${SECRET_PASSWORD:-}}"
          if [ -n "${PASS}" ]; then echo "::add-mask::${PASS}"; fi
          if [ -n "${LOGIN}" ]; then echo "::add-mask::${LOGIN}"; fi
          echo "secrets_diag MAILRU_LOGIN=$([ -n "${SECRET_LOGIN:-}" ] && echo Y || echo N) MAILRU_PASSWORD=$([ -n "${SECRET_PASSWORD:-}" ] && echo Y || echo N)"
          if [ -n "${LOGIN}" ] && [ -n "${PASS}" ]; then
            if [ -n "${INPUT_PASSWORD}" ] || [ -n "${INPUT_LOGIN}" ]; then
              echo "Источник: форма Run workflow"
            else
              echo "Источник: repository secrets"
            fi
            {
              echo "MAILRU_LOGIN<<EOF"
              echo "${LOGIN}"
              echo "EOF"
              echo "MAILRU_PASSWORD<<EOF"
              echo "${PASS}"
              echo "EOF"
            } >> "${GITHUB_ENV}"
          else
            echo "Источник: cred-blob fallback (нет secrets/формы)"
          fi

      - name: Upload sync-state.json to Mail.ru shared folder
        env:
          SYNC_JSONBLOB_URL: ${{ secrets.SYNC_JSONBLOB_URL }}
          MAILRU_WEBLINK: ${{ secrets.MAILRU_WEBLINK }}
          MAILRU_SYNC_NAME: ${{ secrets.MAILRU_SYNC_NAME }}
          MAILRU_CRED_BLOB_URL: ${{ secrets.MAILRU_CRED_BLOB_URL }}
        run: python3 scripts/push_mailru_sync.py
