name: Push sync to Mail.ru folder

on:
  workflow_dispatch:
    inputs:
      mailru_login:
        description: "Почта Mail.ru (например rusakov_751@bk.ru)"
        required: true
        type: string
      mailru_password:
        description: "Пароль для внешних приложений (НЕ обычный пароль). Лучше потом перенести в Secrets."
        required: true
        type: string
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/push_mailru_sync.py"
      - ".github/workflows/mailru-sync.yml"

jobs:
  push-mailru:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve credentials
        id: creds
        env:
          SECRET_LOGIN: ${{ secrets.MAILRU_LOGIN || secrets.MAILRU_EMAIL || secrets.MAIL_LOGIN }}
          SECRET_PASSWORD: ${{ secrets.MAILRU_PASSWORD || secrets.MAILRU_PASS || secrets.MAILRU_APP_PASSWORD || secrets.MAIL_PASSWORD }}
        run: |
          set -euo pipefail
          # Read form inputs from event JSON (avoids printing password in the step env block).
          INPUT_LOGIN="$(python3 -c 'import json,os; e=json.load(open(os.environ["GITHUB_EVENT_PATH"])); print(((e.get("inputs") or {}).get("mailru_login") or "").strip())')"
          INPUT_PASSWORD="$(python3 -c 'import json,os; e=json.load(open(os.environ["GITHUB_EVENT_PATH"])); print(((e.get("inputs") or {}).get("mailru_password") or "").strip())')"
          LOGIN="${INPUT_LOGIN:-${SECRET_LOGIN:-}}"
          PASS="${INPUT_PASSWORD:-${SECRET_PASSWORD:-}}"
          if [ -n "${PASS}" ]; then echo "::add-mask::${PASS}"; fi
          if [ -n "${LOGIN}" ]; then echo "::add-mask::${LOGIN}"; fi
          if [ -z "${LOGIN}" ] || [ -z "${PASS}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::Нужны почта и пароль приложения в форме Run workflow."
              exit 1
            fi
            echo "::notice::Пропуск: нет MAILRU_LOGIN/MAILRU_PASSWORD. Для загрузки запустите Run workflow и заполните форму."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "skip=false" >> "${GITHUB_OUTPUT}"
          if [ -n "${INPUT_LOGIN}" ]; then
            echo "Источник: форма Run workflow"
            echo "::warning::Пароль из формы может сохраниться в логах GitHub. Смените пароль приложения после успешной загрузки и перенесите его в Repository secrets."
          else
            echo "Источник: repository secrets"
          fi
          {
            echo "MAILRU_LOGIN<<EOF"
            echo "${LOGIN}"
            echo "EOF"
            echo "MAILRU_PASSWORD<<EOF"
            echo "${PASS}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Upload sync-state.json to Mail.ru shared folder
        if: steps.creds.outputs.skip != 'true'
        env:
          SYNC_JSONBLOB_URL: ${{ secrets.SYNC_JSONBLOB_URL }}
          MAILRU_WEBLINK: ${{ secrets.MAILRU_WEBLINK }}
          MAILRU_SYNC_NAME: ${{ secrets.MAILRU_SYNC_NAME }}
        run: python3 scripts/push_mailru_sync.py
