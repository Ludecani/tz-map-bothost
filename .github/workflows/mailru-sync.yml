name: Push sync to Mail.ru folder

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes — keeps «Синхронизация»/sync-state.json up to date from jsonblob.
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/push_mailru_sync.py"
      - ".github/workflows/mailru-sync.yml"

jobs:
  push-mailru:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upload sync-state.json to Mail.ru shared folder
        env:
          MAILRU_LOGIN: ${{ secrets.MAILRU_LOGIN }}
          MAILRU_PASSWORD: ${{ secrets.MAILRU_PASSWORD }}
          SYNC_JSONBLOB_URL: ${{ secrets.SYNC_JSONBLOB_URL }}
          MAILRU_WEBLINK: ${{ secrets.MAILRU_WEBLINK }}
          MAILRU_SYNC_NAME: ${{ secrets.MAILRU_SYNC_NAME }}
        run: python3 scripts/push_mailru_sync.py
