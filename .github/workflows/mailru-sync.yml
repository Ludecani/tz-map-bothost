name: Push sync to Mail.ru folder

on:
  workflow_dispatch:
    inputs:
      mailru_login:
        description: "Почта Mail.ru (оставьте пустым, если уже есть secret MAILRU_LOGIN)"
        required: false
        type: string
        default: ""
      mailru_password:
        description: "Пароль приложения (оставьте пустым, если уже есть secret MAILRU_PASSWORD)"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/push_mailru_sync.py"
      - ".github/workflows/mailru-sync.yml"

jobs:
  push-mailru:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve credentials
        id: creds
        env:
          SECRET_LOGIN: ${{ secrets.MAILRU_LOGIN || secrets.MAILRU_EMAIL || secrets.MAIL_LOGIN }}
          SECRET_PASSWORD: ${{ secrets.MAILRU_PASSWORD || secrets.MAILRU_PASS || secrets.MAILRU_APP_PASSWORD || secrets.MAIL_PASSWORD }}
        run: |
          set -euo pipefail
          # Form inputs override secrets when non-empty; otherwise use repository secrets.
          INPUT_LOGIN="$(python3 -c 'import json,os; e=json.load(open(os.environ["GITHUB_EVENT_PATH"])); print(((e.get("inputs") or {}).get("mailru_login") or "").strip())')"
          INPUT_PASSWORD="$(python3 -c 'import json,os; e=json.load(open(os.environ["GITHUB_EVENT_PATH"])); print(((e.get("inputs") or {}).get("mailru_password") or "").strip())')"
          LOGIN="${INPUT_LOGIN:-${SECRET_LOGIN:-}}"
          PASS="${INPUT_PASSWORD:-${SECRET_PASSWORD:-}}"
          if [ -n "${PASS}" ]; then echo "::add-mask::${PASS}"; fi
          if [ -n "${LOGIN}" ]; then echo "::add-mask::${LOGIN}"; fi

          LOGIN_LEN=${#SECRET_LOGIN}
          PASS_LEN=${#SECRET_PASSWORD}
          echo "secrets_diag login_len=${LOGIN_LEN} pass_len=${PASS_LEN} event=${GITHUB_EVENT_NAME}"
          if [ "${LOGIN_LEN}" = "0" ] || [ "${PASS_LEN}" = "0" ]; then
            echo "::warning::Secrets not visible to this job. Need Repository secrets (not Environment) named exactly MAILRU_LOGIN and MAILRU_PASSWORD: https://github.com/Ludecani/tz-map-bothost/settings/secrets/actions"
          fi

          if [ -z "${LOGIN}" ] || [ -z "${PASS}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::Нет учётных данных. Добавьте Repository secrets MAILRU_LOGIN и MAILRU_PASSWORD: https://github.com/Ludecani/tz-map-bothost/settings/secrets/actions — или заполните поля формы Run workflow."
              exit 1
            fi
            echo "::notice::Пропуск: нет MAILRU_LOGIN/MAILRU_PASSWORD. Добавьте secrets или запустите Run workflow с формой."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "skip=false" >> "${GITHUB_OUTPUT}"
          if [ -n "${INPUT_PASSWORD}" ] || [ -n "${INPUT_LOGIN}" ]; then
            echo "Источник: форма Run workflow (перекрывает secrets при непустых полях)"
            if [ -z "${SECRET_PASSWORD:-}" ]; then
              echo "::notice::После успеха добавьте MAILRU_LOGIN и MAILRU_PASSWORD в Repository secrets, чтобы schedule/push работали без формы."
            fi
          else
            echo "Источник: repository secrets"
          fi
          {
            echo "MAILRU_LOGIN<<EOF"
            echo "${LOGIN}"
            echo "EOF"
            echo "MAILRU_PASSWORD<<EOF"
            echo "${PASS}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Upload sync-state.json to Mail.ru shared folder
        if: steps.creds.outputs.skip != 'true'
        env:
          SYNC_JSONBLOB_URL: ${{ secrets.SYNC_JSONBLOB_URL }}
          MAILRU_WEBLINK: ${{ secrets.MAILRU_WEBLINK }}
          MAILRU_SYNC_NAME: ${{ secrets.MAILRU_SYNC_NAME }}
        run: python3 scripts/push_mailru_sync.py

